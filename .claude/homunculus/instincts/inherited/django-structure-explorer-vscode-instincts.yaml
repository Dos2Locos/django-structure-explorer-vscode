# Django Structure Explorer Vscode Workflow Parser Enhancement And Test Extension

## Action

Follow the parser-enhancement-and-test-extension workflow:
1. Modify src/djangoProjectAnalyzer.ts to implement parsing improvements or bugfixes.
2. Update or add test cases in src/test/analyzer.test.ts to cover new parsing logic.
3. Add or modify fixture files in src/test/fixtures/criticalapp/ (e.g., admin.py, models.py, urls.py, settings.py) to provide real Django code samples for testing.
4. Run tests to ensure all cases pass.
5. Optionally, update test setup or configuration files (e.g., src/test/setup.ts, .mocharc.json) if test harness changes are needed.

## Evidence

- Workflow detected from commit patterns
- Frequency: ~2x per month
- Files: src/djangoProjectAnalyzer.ts, src/test/analyzer.test.ts, src/test/fixtures/criticalapp/admin.py

